{% extends "base.html" %}
{% block content %}
<section class="hero compact">
  <div class="hero__text">
    <p class="eyebrow">Вход</p>
    <h1>С возвращением!</h1>
    <p>Войдите в аккаунт, чтобы продолжить обучение и отслеживать прогресс.</p>
  </div>
</section>

<section class="section-block">
  <section class="auth">
    <form method="post" class="stack-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn primary" type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрируйтесь</a></p>
  </section>
</section>
{% endblock %}
