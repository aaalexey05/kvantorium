services:
  web:
    build: .
    command: sh -c "python src/manage.py migrate && python src/manage.py collectstatic --noinput && python src/manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/sites-enabled/kvantorium.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/staticfiles:/var/www/static:ro
      - ./src/media:/var/www/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  pgdata:
